version: '3.9'

services:
  db:
    image: postgres:16
    container_name: watchdeal_db
    environment:
      POSTGRES_USER: watchdeal
      POSTGRES_PASSWORD: watchdeal
      POSTGRES_DB: watchdeal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchdeal -d watchdeal"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchdeal_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://watchdeal:watchdeal@db:5432/watchdeal
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        playwright install chromium &&
        playwright install-deps chromium &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchdeal_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
